[build]
  command = "pnpm install && pnpm --filter @workspace/qr-generator run build"
  publish = "artifacts/qr-generator/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PORT = "3000"
  BASE_PATH = "/"

# SPA fallback so client-side routes resolve
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Service worker should not be cached aggressively
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=0, must-revalidate"
